<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Albion Profit - Market Flip</title>
  <link rel="stylesheet" href="../style.css" />

<body>

  <header>
    <h1>
      <img src="../images/items/T8_BAG.png" alt="Icono" width="40" height="40" class="header-icon" />

    <aside class="config-panel">
      <h3>Market Flip</h3>
